<!DOCTYPE html>
<html>
<head>
    <title>Language Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🌐 Language Detection Tool</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter text here...">{{ text }}</textarea>
        <button type="submit">Detect Language</button>
    </form>

    <h2>Result:</h2>
    <div class="result">
        {{ language }}
    </div>
</div>

</body>
</html>
